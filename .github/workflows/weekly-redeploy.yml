name: Weekly Blog Redeploy

on:
  schedule:
    # Every Monday at 00:00 UTC (08:00 Taiwan time)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  redeploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger redeploy with empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: weekly redeploy for scheduled blog articles"
          git push
